<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สร้างรายการสำเร็จ</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
            animation: fadeIn 0.6s ease;
        }

        .success-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #e94560;
            margin: 0 auto 20px;
            position: relative;
            animation: pop 0.5s ease;
        }

        .checkmark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            font-size: 50px;
            color: #e94560;
            animation: check 0.5s ease forwards;
            animation-delay: 0.4s;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        .order-info {
            color: #ccc;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }

        .progress {
            width: 200px;
            height: 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            margin: 20px auto 0;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: #e94560;
            width: 0%;
            animation: load 2.5s linear forwards;
        }

        @keyframes pop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes check {
            to {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        @keyframes load {
            from {
                width: 0%;
            }

            to {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <div class="success-circle">
            <div class="checkmark">✔</div>
        </div>

        <h1>สร้างรายการสำเร็จ</h1>

        <div class="order-info" id="orderInfo"></div>

        <div class="progress">
            <div class="progress-bar"></div>
        </div>
    </div>

    <script>
        // ✅ ดึง parameter จาก URL
        const urlParams = new URLSearchParams(window.location.search);

        let user_id = urlParams.get("user_id");
        let order_number = urlParams.get("order_number");

        console.log(urlParams);
        // แสดงผล
        document.getElementById("orderInfo").innerText =
            `Order: ${order_number || '-'} | User: ${user_id || '-'}`;

        // 🔥 (OPTIONAL) ยิง API ไป backend
        // ใช้ถ้าคุณต้องการ confirm order / update status
        if (user_id && order_number) {
            fetch("https://your-api.com/confirm-order", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    user_id: user_id,
                    order_number: order_number
                })
            })
                .then(res => res.json())
                .then(data => console.log("confirm success:", data))
                .catch(err => console.error("error:", err));
        }

        // ปิดหน้าอัตโนมัติ
        setTimeout(() => {
            if (window.liff) {
                liff.closeWindow();
            } else {
                window.close();
            }
        }, 2500);
    </script>

</body>

</html>
