<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังดำเนินการ</title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
        }

        /* loader */
        .loader {
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #e94560;
            border-radius: 50%;
            width: 90px;
            height: 90px;
            margin: auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* success */
        .success-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #e94560;
            margin: auto;
            position: relative;
            display: none;
        }

        .checkmark {
            position: absolute;
            font-size: 50px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: pop 0.4s forwards;
        }

        @keyframes pop {
            to {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        h1 {
            margin-top: 20px;
            font-size: 1.4rem;
        }

        .order-info {
            margin-top: 10px;
            color: #ccc;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="loader" class="loader"></div>

        <div id="success" class="success-circle">
            <div class="checkmark">✔</div>
        </div>

        <h1 id="text">กำลังสร้างรายการ...</h1>
        <div id="orderInfo" class="order-info"></div>
    </div>

    <script>
        const LIFF_ID = "2009103442-rALLRnvu";

        // 🔥 parse param (รองรับ liff.state)
        function getAllParams() {
            const urlParams = new URLSearchParams(window.location.search);
            let params = Object.fromEntries(urlParams.entries());

            if (params["liff.state"]) {
                const decoded = decodeURIComponent(params["liff.state"]);
                const inner = new URLSearchParams(decoded);
                params = Object.fromEntries(inner.entries());
            }

            return params;
        }

        async function main() {
            try {
                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();
                const user_id = profile.userId;

                const params = getAllParams();
                const order_number = params.order_number;

                document.getElementById("orderInfo").innerText =
                    `Order: ${order_number || '-'}`;

                // 🔥 ยิง API (รอจริง)
                const res = await fetch("https://n8n.scgjwd.com/webhook/confirm-order", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id,
                        order_number
                    })
                });

                const data = await res.json();

                // ✅ success animation
                document.getElementById("loader").style.display = "none";
                document.getElementById("success").style.display = "block";
                document.getElementById("text").innerText = "สร้างรายการสำเร็จ";

                // ✅ ปิด LIFF
                setTimeout(() => {
                    if (liff.isInClient()) {
                        liff.closeWindow();
                    }
                }, 1500);

            } catch (err) {
                console.error(err);
                document.getElementById("text").innerText = "เกิดข้อผิดพลาด";
            }
        }

        document.addEventListener("DOMContentLoaded", main);
    </script>

</body>

</html>
