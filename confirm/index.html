<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>กำลังดำเนินการ</title>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }

        .container {
            text-align: center;
        }

        /* loader */
        .loader {
            border: 5px solid rgba(255, 255, 255, 0.2);
            border-top: 5px solid #e94560;
            border-radius: 50%;
            width: 90px;
            height: 90px;
            margin: auto;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* success */
        .success-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #e94560;
            margin: auto;
            position: relative;
            display: none;
        }

        .checkmark {
            position: absolute;
            font-size: 50px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            animation: pop 0.4s forwards;
        }

        @keyframes pop {
            to {
                transform: translate(-50%, -50%) scale(1);
            }
        }

        h1 {
            margin-top: 20px;
            font-size: 1.4rem;
        }

        .order-info {
            margin-top: 10px;
            color: #ccc;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="container">
        <div id="loader" class="loader"></div>

        <div id="success" class="success-circle">
            <div class="checkmark">✔</div>
        </div>

        <h1 id="text">กำลังสร้างรายการ...</h1>
        <div id="orderInfo" class="order-info"></div>
    </div>

    <script>
        const LIFF_ID = "2009103442-rALLRnvu";

        // 🔥 parse param (รองรับ liff.state)
        function getAllParams() {
            const urlParams = new URLSearchParams(window.location.search);
            let params = Object.fromEntries(urlParams.entries());

            if (params["liff.state"]) {
                const decoded = decodeURIComponent(params["liff.state"]);
                const inner = new URLSearchParams(decoded);
                params = Object.fromEntries(inner.entries());
            }

            return params;
        }

        async function main() {
            await liff.init({ liffId: LIFF_ID });

            if (!liff.isLoggedIn()) {
                liff.login();
            } else {

                // ✅ 1. อ่าน params ก่อน
                const params = getAllParams();
                const order_number = params.order_number;
                const user_id = params.user_id;

                // 👉 กันพลาด (optional แต่แนะนำ)
                if (order_number) {
                    sessionStorage.setItem("order_number", order_number);
                }
                if (user_id) {
                    sessionStorage.setItem("user_id", user_id);
                }

                // ✅ 2. ค่อยลบ query
                const url = new URL(window.location.href);
                url.searchParams.delete("code");
                url.searchParams.delete("state");
                url.searchParams.delete("liffClientId");
                url.searchParams.delete("liffRedirectUri");

                window.history.replaceState({}, document.title, url.pathname + url.search);

                // ✅ 3. ดึงค่าที่ใช้จริง
                const finalOrderNumber = order_number || sessionStorage.getItem("order_number");
                const finalUserId = user_id || sessionStorage.getItem("user_id");

                // ✅ 4. get profile
                const profile = await liff.getProfile();

                document.getElementById("orderInfo").innerText =
                    `Order: ${finalOrderNumber || '-'}`;

                // 🔥 ยิง API
                const res = await fetch("https://n8n.scgjwd.com/webhook/confirm-order", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        user_id: finalUserId, // 👉 ใช้ค่าที่เซฟแล้ว
                        order_number: finalOrderNumber
                    })
                });

                const data = await res.json();

                // ✅ success UI
                document.getElementById("loader").style.display = "none";
                document.getElementById("success").style.display = "block";
                document.getElementById("text").innerText = "สร้างรายการสำเร็จ";

                setTimeout(() => {
                    if (liff.isInClient()) {
                        liff.closeWindow();
                    }
                }, 1500);
            }

        }

        document.addEventListener("DOMContentLoaded", main);
    </script>

</body>

</html>
