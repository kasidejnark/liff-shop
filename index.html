<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>LINE Auth</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>

<body>
    <h2>กำลังเชื่อมต่อ LINE...</h2>
    <div id="userProfile"></div>

    <script>
        const LIFF_ID = "2009103442-3YEGIxwm";

        async function initLiff() {
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }


                const profile = await liff.getProfile();
                // แสดงผล
                document.getElementById("userProfile").innerHTML = `
          <img src="${profile.pictureUrl}" width="60" style="border-radius:50%">
          <p>${profile.displayName}</p>
          <p>${profile.userId}</p>
        `;

                // ส่งไป n8n
                await fetch("https://n8n.scgjwd.com/webhook/lineuser", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        lineId: profile.userId,
                        displayName: profile.displayName,
                        pictureUrl: profile.pictureUrl
                    })
                });

                // เก็บ local
                localStorage.setItem("lineUserId", profile.userId);

                console.log("Saved LINE ID:", profile.userId);

            } catch (err) {
                console.error("LIFF error:", err);
            }
        }

        document.addEventListener("DOMContentLoaded", initLiff);
    </script>
</body>

</html>
