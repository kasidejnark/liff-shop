<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Shop</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f6fa;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 420px;
        }

        img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        input {
            width: 80px;
            padding: 8px;
            font-size: 16px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #06c755;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #05a94a;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="card">

            <h2>สินค้า</h2>

            <img id="product-image">

            <div id="product-name" class="product-name"></div>

            <input id="qty" type="number" value="1" min="1">

            <button onclick="send()">เพิ่มลงตะกร้า</button>

        </div>

    </div>

    <script>
        const LIFF_ID = "2009103442-jjBxlAv8";

        async function initLiff() {
            if (!window.liff) {
                console.error("LIFF SDK not loaded");
                return;
            }
            try {

                await liff.init({
                    liffId: LIFF_ID
                });

                if (!liff.isLoggedIn()) {
                    liff.login();
                    return;
                }

                const profile = await liff.getProfile();
                // const params = new URLSearchParams(window.location.search);
                // const product_code = params.get("product_code");
                // const botnoiId = params.get("botnoi");
                // const params = new URLSearchParams(window.location.search);
                // const botnoiId = params.get("botnoi");
                // const product_code = params.get("product_code");

                // console.log("LINE user:", profile.userId);
                // console.log("botnoi id:", botnoiId);
                // console.log("product code:", product_code);

                // localStorage.setItem("lineUserId", profile.userId);
                // localStorage.setItem("botnoiUserId", botnoiId);
                // localStorage.setItem("productCode", product_code);
            } catch (err) {
                console.error("LIFF init error:", err);
            }
        }

        async function getProductData() {
            // const product_code = new URLSearchParams(window.location.search).get("product_code");
            const product_code = localStorage.getItem("productCode");
            try {
                const response = await fetch(`https://n8n.scgjwd.com/webhook/product-data?product_code=${product_code}`, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json"
                    },
                });

                products = await response.json();
                document.getElementById("product-image").src = products.image
                document.getElementById("product-name").innerText = products.product_name
            } catch (error) {
                console.error("Error fetching product data from n8n:", error);
            }
        }



        function send() {
            const productCode = localStorage.getItem("productCode");
            const botnoiUserId = localStorage.getItem("botnoiUserId");


            const qty = document.getElementById('qty').value;

            fetch('https://n8n.scgjwd.com/webhook/50fb92c4-7186-48dd-a286-045ee6c40314', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    product: productCode,
                    qty: qty,
                    user_id: botnoiUserId
                })
            })
                .then(res => res.json())
                .then(data => {
                    alert("เพิ่มสินค้าเรียบร้อย");
                })

        }

        // Initialize
        document.addEventListener("DOMContentLoaded", async () => {
            await initLiff();
            await getProductData();

        });
    </script>

</body>

</html>
