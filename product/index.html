<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Mini Shop</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f5f6fa;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 100%;
            max-width: 420px;
        }

        img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        h2 {
            margin-bottom: 15px;
        }

        .product-name {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        input {
            width: 80px;
            padding: 8px;
            font-size: 16px;
            text-align: center;
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #06c755;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            background: #05a94a;
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="card">

            <h2>สินค้า</h2>

            <img id="product-image">

            <div id="product-name" class="product-name"></div>

            <input id="qty" type="number" value="1" min="1">

            <button id="add-btn" onclick="send()" disabled>กำลังโหลด...</button>

        </div>

    </div>

    <script>
        const LIFF_ID = "2009103442-jjBxlAv8";

        async function initLiff() {
            if (!window.liff) {
                console.error("LIFF SDK not loaded");
                return;
            }
            try {
                // ✅ เก็บ query ก่อนโดน redirect
                const params = new URLSearchParams(window.location.search);
                const product_codeFromUrl = params.get("product_code");
                const botnoiFromUrl = params.get("botnoi");
                if (botnoiFromUrl) {
                    localStorage.setItem("botnoi", botnoiFromUrl);
                    localStorage.setItem("product_code", product_codeFromUrl);
                    localStorage.setItem("productCode", product_codeFromUrl);
                }

                await liff.init({ liffId: LIFF_ID });

                if (!liff.isLoggedIn()) {
                    liff.login({
                        redirectUri: window.location.origin + "/product/"
                    });
                    return;
                }

                // ✅ ใช้ค่าที่เก็บไว้แทน
                let botnoiId = localStorage.getItem("botnoi");
                let productCode = localStorage.getItem("product_code");

                const profile = await liff.getProfile();
                // ✅ ถ้าไม่มี botnoi → ใช้ LINE userId แทน
                if (!botnoiId || botnoiId === "null" || botnoiId === "undefined") {
                    botnoiId = profile.userId;
                    localStorage.setItem("botnoi", botnoiId);
                }

                // ✅ ค่อยล้าง URL (ตอนนี้ไม่กลัวหายแล้ว)
                const cleanUrl = `/product/?botnoi=${botnoiId}`;
                window.history.replaceState({}, document.title, cleanUrl);


                localStorage.setItem("lineUserId", profile.userId);
                localStorage.setItem("botnoiUserId", botnoiId);
                localStorage.setItem("productCode", productCode);
            } catch (err) {
                console.error("LIFF init error:", err);
            }
        }

        async function getProductData() {
            // const product_code = new URLSearchParams(window.location.search).get("product_code");
            const product_code = localStorage.getItem("productCode");
            try {
                const response = await fetch(`https://n8n.scgjwd.com/webhook/products?product_code=${product_code}`, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json"
                    },
                });

                products = await response.json();
                document.getElementById("product-image").src = products[0].image
                document.getElementById("product-name").innerText = products[0].product_name

                // ✅ เปิดปุ่มเมื่อโหลดเสร็จ
                const btn = document.getElementById("add-btn");
                btn.disabled = false;
                btn.innerText = "เพิ่มลงตะกร้า";
            } catch (error) {
                console.error("Error fetching product data from n8n:", error);
            }
        }



        function send() {
            const productCode = localStorage.getItem("productCode");
            const botnoiUserId = localStorage.getItem("botnoiUserId");

            const productname = document.getElementById('product-name').innerText;
            const qty = document.getElementById('qty').value;

            fetch(`https://n8n.scgjwd.com/webhook/add-cart?user_id=${botnoiUserId}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify([{
                    "product_code": productCode,
                    "product_name": productname,
                    "quantity": qty
                }])
            })
                .then(res => res.json())
                .then(data => {
                    alert("เพิ่มสินค้าเรียบร้อย");
                })

        }

        // Initialize
        document.addEventListener("DOMContentLoaded", async () => {
            await initLiff();
            await getProductData();

        });
    </script>

</body>

</html>
